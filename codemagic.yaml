workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      java: 21
    scripts:
      - name: Set gradlew permissions
        script: |
          cd Android/src
          chmod +x ./gradlew
      - name: Build debug APK
        script: |
          cd Android/src
          ./gradlew assembleDebug
    artifacts:
      - Android/src/app/build/outputs/**/*.apk
